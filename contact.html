<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Elite Business Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/embed.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg custom-nav navbar-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="assets/images/logo.png" alt="Elite Business Solutions Logo" width="150" height="50">
                </a>
                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                        <li class="nav-item"><a class="nav-link" href="portfolio.html">Portfolio</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact Us</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 bg-white p-4 rounded shadow-sm">
                <h2 class="mb-4 text-center">Client Feedback & Inquiries</h2>
                
                <form id="feedbackForm" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" required placeholder="Enter your full name">
                    </div>
                    
                    <div class="mb-3">
                        <label for="emailAddr" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="emailAddr" required placeholder="name@example.com">
                    </div>

                    <div class="mb-3">
                        <label for="msgSubject" class="form-label">Subject</label>
                        <input type="text" class="form-control" id="msgSubject" required placeholder="Topic of inquiry">
                    </div>

                    <div class="mb-3">
                        <label for="userMessage" class="form-label">Message/Feedback</label>
                        <textarea class="form-control" id="userMessage" rows="5" required placeholder="Write your message here..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Submit Validation Request</button>
                </form>
                
                <div id="formStatus" class="alert alert-success d-none mt-4" role="alert">
                    Your transmission was validated successfully. Thank you for your feedback!
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('feedbackForm').addEventListener('submit', function (event) {
            event.preventDefault(); // Prevents page reload during simulation
            
            const form = event.target;
            const statusBox = document.getElementById('formStatus');

            if (!form.checkValidity()) {
                event.stopPropagation();
                form.classList.add('was-validated');
                statusBox.classList.add('d-none');
            } else {
                form.classList.remove('was-validated');
                statusBox.classList.remove('d-none');
                form.reset(); // Clears entries upon validation pass
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
